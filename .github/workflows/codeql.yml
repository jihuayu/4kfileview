name: CodeQL

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  schedule:
    - cron: '30 18 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: +security-extended

      - name: Build for CodeQL
        run: mvn -B -ntp -pl server -am -DskipTests -Dassembly.skipAssembly=true -Dlibreoffice.portable.skip=true test-compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

